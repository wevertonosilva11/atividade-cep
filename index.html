<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head> 
<body>

<div class="container">
        <h2>Busca de CEP</h2>
        
        <div class="search-box">
            <input type="text" id="cepInput" placeholder="Digite o CEP" onblur="buscarCEP()">
            <button onclick="buscarCEP()">Pesquisar</button>
        </div>

        <div id="resultado" class="hidden">
            <p><strong>CEP:</strong> <span id="resCep"></span></p>
            <p><strong>Logradouro:</strong> <span id="resLogradouro"></span></p>
            <p><strong>Bairro:</strong> <span id="resBairro"></span></p>
            <p><strong>Cidade:</strong> <span id="resCidade"></span></p>
            <p><strong>Estado:</strong> <span id="resEstado"></span></p>
        </div>

        <p id="erro" class="escondido">CEP não encontrado, tente novamente!</p>
    </div>
    
</body>
</html>
